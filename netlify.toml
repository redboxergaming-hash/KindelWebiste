[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/api-health"
  status = 200

[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/api-weather"
  status = 200

[[redirects]]
  from = "/api/calendar"
  to = "/.netlify/functions/api-calendar"
  status = 200

[[redirects]]
  from = "/api/feed"
  to = "/.netlify/functions/api-feed"
  status = 200
